<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HTMLタグサンプル</title>
</head>
<body>
    <h1>リストとテーブルの例</h1>

    <h2>順序なしリスト (ul) と順序付きリスト (ol)</h2>
    <ul>
        <li>順序なしリスト項目1</li>
        <li>順序なしリスト項目2</li>
        <li>順序なしリスト項目3</li>
    </ul>

    <ol>
        <li>順序付きリスト項目1</li>
        <li>順序付きリスト項目2</li>
        <li>順序付きリスト項目3</li>
    </ol>

    <h2>テーブルの例</h2>
    <table border="1">
        <tr>
            <td>行1, セル1</td>
            <td>行1, セル2</td>
        </tr>
        <tr>
            <td>行2, セル1</td>
            <td>行2, セル2</td>
        </tr>
    </table>
</body>
</html>
